<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IRIS{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/img/cs-favicon-32.png">

    <!-- Apply the saved theme before first paint to avoid a flash. -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('iris-theme') || 'dark';
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Saira+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v={{ static_v }}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand" aria-label="Critical Start IRIS — home">
            <img src="/static/img/cs-mark-256.png" alt="Critical Start" class="brand-mark">
            <span class="brand-text">
                <span class="brand-cs">CRITICAL START</span>
                <span class="brand-iris">IRIS</span>
            </span>
        </a>
        <div class="nav-right">
            <span class="nav-tagline">Intelligent Risk Inspection System</span>
            <button id="theme-toggle" class="theme-toggle" type="button"
                    aria-label="Toggle light and dark theme" title="Toggle theme">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
                </svg>
            </button>
        </div>
    </nav>

    <main class="container {% block container_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>IRIS v0.1.0 &mdash; Intelligent Risk Inspection System</p>
    </footer>

    <script src="/static/theme.js?v={{ static_v }}"></script>
</body>
</html>
