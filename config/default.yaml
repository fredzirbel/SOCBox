# IRIS Configuration
# Copy this file to config/local.yaml and fill in your API keys.

api_keys:
  virustotal: ""
  google_safebrowsing: ""
  abuseipdb: ""
  # abuse.ch Auth-Key (free, from https://auth.abuse.ch) — used by `iris-feeds`
  # to pull recent URLhaus URLs via the official API instead of scraping.
  urlhaus: ""

# Completion webhook for async scans (POST /api/v1/scan/async). Leave webhook_url
# empty to disable; a per-request callback_url overrides it.
notifications:
  webhook_url: ""
  webhook_timeout: 10

# Transparent in-browser CAPTCHA solving (self-hosted noVNC). When a single
# analyst-initiated web scan hits an un-automatable CAPTCHA, IRIS surfaces the
# live detonation browser in the analyst's tab so they can solve it; the scan
# then continues to the real landing page. Bulk / agent / async scans never
# block on a human regardless of this setting.
#
# SECURITY: the noVNC viewer is a live, controllable browser pointed at
# malicious pages. It MUST sit behind API auth / SSO (item #6) or a VPN before
# any network exposure. The vnc_password + per-scan session token are a v1
# guard, not a substitute for that.
interactive:
  enabled: false
  # Base URL the *analyst's browser* uses to reach the noVNC viewer. Defaults to
  # the same host on port 6080; override when behind a reverse proxy.
  novnc_public_url: "http://localhost:6080/vnc.html"
  # Shared VNC password enforced by x11vnc (-rfbauth). Set a real value in
  # local.yaml. Empty disables the auto-fill (analyst is prompted by noVNC).
  vnc_password: ""
  # How long to wait for the analyst to solve before giving up (notice -> open
  # viewer -> solve round trip). Milliseconds.
  session_timeout_ms: 300000
  # X display the headed takeover browser renders on (matches the entrypoint).
  display: ":99"

# Bulk Scan concurrency — how many URLs scan in parallel.
# Each parallel scan runs its own headed Chrome, so this is bound by RAM/CPU,
# NOT by a code limit: pushing it too high causes OOM/timeouts and SLOWER scans,
# and more simultaneous CAPTCHA gates contend for the single solver display.
# Tune to your host; the app hard-caps it at 8.
bulk:
  max_concurrent: 5

# ── Authentication ───────────────────────────────────────────────────────────
# Analysts log in via OIDC SSO; the AI triage agent / SOAR uses bearer service
# tokens. Every page, /api/*, /stream, and /screenshots requires a valid session
# cookie OR bearer token. Secrets come from env, NEVER this committed file:
#   IRIS_SESSION_SECRET        - signs the session cookie (generate 32+ random bytes)
#   IRIS_OIDC_CLIENT_SECRET    - the OIDC app client secret
#   IRIS_API_TOKENS            - comma-separated service tokens for the agent
auth:
  # oidc = SSO (production) | dev = INSECURE auto-login for local testing
  #   (also requires IRIS_AUTH_DEV=1) | disabled = no auth (air-gapped only)
  mode: oidc
  oidc:
    # e.g. https://login.microsoftonline.com/<tenant-id>/v2.0/.well-known/openid-configuration
    discovery_url: ""
    client_id: ""
    scopes: "openid email profile"
    # Public URL the IdP redirects back to, e.g. https://iris.internal/auth/callback
    redirect_url: ""

# ── SSRF guard ───────────────────────────────────────────────────────────────
# Block scans whose target resolves to a private / loopback / link-local /
# cloud-metadata address, so the scanner can't be turned into a server-side
# request oracle against internal infrastructure.
ssrf:
  block_private: true
  allowlist: []   # hostnames exempted (e.g. sanctioned internal test rigs)

# ── Rate limiting ────────────────────────────────────────────────────────────
ratelimit:
  scan_per_minute: 30   # per service-token / client IP

scoring:
  weights:
    # Analyzer weights are now validated and must sum to 100.
    # Threat feeds are scored via scoring.blend/feed_weights (below), so
    # the analyzer-layer threat_feeds weight is intentionally 0 to avoid
    # double-counting the same feed signal.
    url_lexical: 20
    whois_dns: 15
    ssl_tls: 10
    http_response: 15
    page_content: 15
    link_discovery: 10
    download: 15
    threat_feeds: 0
  thresholds:
    safe: 25
    malicious: 60
  blend:
    analyzer_weight: 0.45
    feed_weight: 0.55
  feed_weights:
    VirusTotal: 40
    Google Safe Browsing: 35
    AbuseIPDB: 25

requests:
  timeout: 10
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  max_redirects: 10
  # Production-safe default. Set false only for controlled lab analysis.
  verify_ssl: true

