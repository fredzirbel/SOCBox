# =============================================================================
# IRIS — Docker Compose
# =============================================================================
#
# Quick start:
#   1. Copy your API keys:  cp config/default.yaml config/local.yaml
#      Edit config/local.yaml with your VirusTotal, Google Safe Browsing, etc. keys
#
#   2. Run:  docker compose up --build
#
#   3. Open:  http://localhost:8080
#      (host port 8080 -> container 8000; 8080 avoids the Windows/WinNAT
#       reserved-port range that can block 8000)
#
# Alternatively, pass API keys as environment variables (see below).
# =============================================================================

services:
  iris:
    build: .
    container_name: iris
    ports:
      # host 8080 -> container 8000 (8080 sidesteps Windows reserved ports)
      - "8080:8000"
      # noVNC live-browser viewer for transparent CAPTCHA solving.
      # SECURITY: this is a controllable browser on malicious pages — keep it
      # behind API auth / SSO (#6) or a VPN before any network exposure.
      - "6080:6080"

    environment:
      # Password x11vnc enforces on the noVNC session. MUST match
      # interactive.vnc_password in config/local.yaml (which the app embeds in
      # the viewer URL). Empty = no VNC password (dev only).
      - VNC_PASSWORD=${VNC_PASSWORD:-}

    # Chrome needs more than the default 64 MB shared memory
    shm_size: "2gb"

    # Pin reliable upstream resolvers.  Docker's embedded DNS (127.0.0.11)
    # can intermittently fail to resolve target domains inside the container,
    # which surfaced as transient ERROR rows in Bulk Scan.  Cloudflare + Google
    # public resolvers make name resolution dependable; the requests-based
    # analyzers also carry a DNS-over-HTTPS fallback for anything these block.
    dns:
      - 1.1.1.1
      - 8.8.8.8

    volumes:
      # Mount local API key config (create from default.yaml, gitignored)
      - ./config/local.yaml:/app/config/local.yaml:ro
      # Persist screenshots across container restarts
      - ./screenshots:/app/screenshots

    # Optional: pass API keys via environment variables instead of local.yaml
    # Uncomment and fill in the keys you have:
    # environment:
    #   - VIRUSTOTAL_API_KEY=your_key_here
    #   - GOOGLE_SAFEBROWSING_API_KEY=your_key_here
    #   - ABUSEIPDB_API_KEY=your_key_here

    restart: unless-stopped
